<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gabo Fragments Society">
  <defs>
    <clipPath id="gfs-clip">
      <rect x="0" y="0" width="220" height="220" rx="6"/>
    </clipPath>
  </defs>

  <g clip-path="url(#gfs-clip)">
    <!-- Cobalt-on-cream block -->
    <rect width="220" height="220" fill="#1E3A6E"/>

    <!-- Cream inner block -->
    <rect x="14" y="14" width="192" height="192" fill="#F5F1E8"/>

    <!-- Fragment grid in subtle cobalt -->
    <g stroke="#1E3A6E" stroke-width="1" opacity="0.18">
      <line x1="14" y1="78" x2="206" y2="78"/>
      <line x1="14" y1="142" x2="206" y2="142"/>
      <line x1="78" y1="14" x2="78" y2="206"/>
      <line x1="142" y1="14" x2="142" y2="206"/>
    </g>

    <!-- GFS monogram — Anton-style heavy condensed in cobalt -->
    <text x="110" y="138"
          text-anchor="middle"
          font-family="'Anton', 'Bebas Neue', Impact, sans-serif"
          font-size="112"
          font-weight="400"
          fill="#1E3A6E"
          letter-spacing="2">GFS</text>

    <!-- Bottom legend, faint -->
    <text x="110" y="186"
          text-anchor="middle"
          font-family="'Inter', system-ui, sans-serif"
          font-size="9"
          font-weight="700"
          letter-spacing="3"
          fill="#0F1F40"
          opacity="0.8">FRAGMENTS SOCIETY</text>
  </g>

  <!-- Outer cobalt rule -->
  <rect x="0.5" y="0.5" width="219" height="219" rx="6" fill="none" stroke="#0F1F40" stroke-width="1"/>
</svg>
